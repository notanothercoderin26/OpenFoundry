server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown route falls through to index.html so
    # react-router-dom can resolve client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must NEVER be cached — it embeds the hashed Vite
    # bundle filenames. A browser-cached copy keeps loading old
    # chunk hashes after a fresh deploy ships new ones, which
    # presents as "I cleared cache but the bug persists".
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Long-lived caching for hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
