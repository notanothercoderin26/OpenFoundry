# Tables holding restricted data (PII, credentials, audit, security policy).
# Direct .Query/.Exec/.QueryRow on these tables from handler-tier code is
# only permitted for services in `allowed_services`. Other services should
# route through the owning service's HTTP API instead of issuing SQL.
restricted_tables:
  users:
    allowed_services: [identity-federation-service]
  user_mfa_totp:
    allowed_services: [identity-federation-service]
  webauthn_credentials:
    allowed_services: [identity-federation-service]
  webauthn_challenges:
    allowed_services: [identity-federation-service]
  refresh_tokens:
    allowed_services: [identity-federation-service]
  api_keys:
    allowed_services: [identity-federation-service]
  jwt_signing_keys:
    allowed_services: [identity-federation-service]
  user_external_identities:
    allowed_services: [identity-federation-service]
  oauth_state:
    allowed_services: [identity-federation-service]
  audit_events:
    allowed_services: [audit-compliance-service, audit-sink]
  audit_delivery_destinations:
    allowed_services: [audit-compliance-service]
  audit_delivery_files:
    allowed_services: [audit-compliance-service]
  compliance_reports:
    allowed_services: [audit-compliance-service]
  cedar_policies:
    allowed_services: [authorization-policy-service]
  abac_policies:
    allowed_services: [authorization-policy-service]
  markings:
    allowed_services: [authorization-policy-service]
  marking_categories:
    allowed_services: [authorization-policy-service]
  marking_permissions:
    allowed_services: [authorization-policy-service]
  marking_category_permissions:
    allowed_services: [authorization-policy-service]
  cipher_channels:
    allowed_services: [authorization-policy-service]
  cipher_licenses:
    allowed_services: [authorization-policy-service]
  cipher_permissions:
    allowed_services: [authorization-policy-service]

# Pre-existing handler-tier queries against restricted tables. Currently
# empty — all in-tree direct DB access on restricted tables already lives
# in internal/repo/ and is correctly scoped. New entries should not be
# added; route through the owning service instead.
grandfathered_handler_queries: []
