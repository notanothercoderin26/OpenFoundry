# Data residency allowlist for OpenFoundry services.
#
# Replaces the legacy Rust-era .github/data-residency-allowlist.toml gate
# (see CLAUDE.md). Two things are gated by tools/data-residency:
#
#  1. Migration residency: every NEW migration under
#     services/<svc>/internal/repo/migrations/*.sql must declare its
#     residency tag on the first line as `-- residency: <region>`. The
#     region must be in the service's `regions` list (or in
#     `default_regions` if the service doesn't override).
#
#  2. Restricted-table access: any direct .Query/.Exec/.QueryRow call from
#     handler-tier code (services/<svc>/internal/handlers/, /handler/)
#     that names a table in `restricted_tables` must come from a service
#     listed under that table's `allowed_services`. Direct queries on
#     restricted tables from non-allowed services are not permitted —
#     route them through the owning service.
#
# The legacy backlog of 195 migrations predates the gate. They are listed
# under each service's `grandfathered_migrations` and are exempt from the
# residency header requirement; we enforce the new gate only on additions
# (the workflow runs the tool with --gate-new-only against origin/main).
#
# Adding a new migration:
#   1. Put `-- residency: us-east-1` (or another permitted region) as the
#      file's first line.
#   2. Run `go run ./tools/data-residency check` locally to verify.
#
# Adding a service to a restricted table's allowed_services should go
# through ADR review (see docs/architecture/adr/).

version: 1

default_regions:
  - us-east-1
  - us-west-2
  - eu-west-1
  - eu-central-1
  - ap-southeast-1

