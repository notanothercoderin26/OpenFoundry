name: Contribution policy

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: conventional PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|perf|refactor|docs|test|build|ci|chore|revert)(\([A-Za-z0-9._/-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title must follow Conventional Commits, for example: feat(ontology): add bulk import endpoint"
            echo "Actual title: $PR_TITLE"
            exit 1
          fi

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit sign-offs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mapfile -t commits < <(git rev-list --reverse --no-merges "$BASE_SHA..$HEAD_SHA")
          if [ "${#commits[@]}" -eq 0 ]; then
            echo "No non-merge commits to validate."
            exit 0
          fi

          failed=0
          for commit in "${commits[@]}"; do
            if ! git log --format=%B -n 1 "$commit" | grep -Eiq '^Signed-off-by: .+ <.+@.+>$'; then
              subject="$(git log --format=%s -n 1 "$commit")"
              echo "::error title=Missing DCO sign-off::${commit} ${subject}"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "Add a DCO trailer with: git commit -s --amend"
            exit 1
          fi
