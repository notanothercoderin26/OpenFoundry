name: helm-lint
# S8.6 — Gate the of-shared library + app release charts on every PR.
# Each release runs `helm lint` and `helm template <release>` to catch
# template breakage before merge. Dependencies are vendored in-chart; do
# not update them from CI.

on:
  push:
    branches: [main]
    paths:
      - 'infra/helm/**'
      - '.github/workflows/helm-lint.yml'
  pull_request:
    paths:
      - 'infra/helm/**'
      - '.github/workflows/helm-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release:
          - of-platform
          - of-data-engine
          - of-ontology
          - of-ml-aip
          - of-apps-ops
          - of-web
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.4
      - name: helm lint
        working-directory: infra/helm/apps/${{ matrix.release }}
        run: helm lint .
      - name: helm template
        working-directory: infra/helm/apps/${{ matrix.release }}
        run: helm template ${{ matrix.release }} . > /tmp/${{ matrix.release }}.yaml
      - name: kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /tmp kubeconform
          /tmp/kubeconform -strict -ignore-missing-schemas -summary /tmp/${{ matrix.release }}.yaml
