name: openfoundry-go CI

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "libs/**"
      - "tools/**"
      - "proto/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".golangci.yml"
      - "buf.gen.yaml"
      - "sqlc.yaml"
      - ".github/workflows/openfoundry-go.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - "libs/**"
      - "tools/**"
      - "proto/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".golangci.yml"
      - "buf.gen.yaml"
      - "sqlc.yaml"
      - ".github/workflows/openfoundry-go.yml"

# Cancel in-flight runs of the same workflow on the same ref. Saves
# minutes on rapid pushes (rebases, force-pushes).
concurrency:
  group: openfoundry-go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tidy:
    name: tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: go mod tidy
        run: go mod tidy
      - name: ensure go.mod / go.sum are committed and clean
        run: |
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::'go mod tidy' produced changes — commit them"
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # golangci-lint with `new-from-rev: HEAD` (set in .golangci.yml)
          # needs git history beyond the tip commit to compute the diff.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          # Must match the schema declared in .golangci.yml (version: "2").
          # Bumps here should track the pin in `make tools`.
          version: v2.5.0
          args: --timeout 5m

  proto:
    name: proto / buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.47.2
      - run: buf lint
      - run: buf generate
      - name: ensure no drift between checked-in & generated proto
        run: |
          status="$(git status --porcelain=v1 --untracked-files=all -- libs/proto-gen)"
          if [ -n "$status" ]; then
            echo "::error::'buf generate' produced drift — commit the regenerated files"
            printf '%s\n' "$status"
            git --no-pager diff -- libs/proto-gen
            exit 1
          fi

  test:
    name: test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: go test -race
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn

  integration:
    name: test (integration)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: run integration suite
        # GitHub-hosted Ubuntu runners ship a working Docker daemon, so
        # testcontainers-go works out of the box. Ryuk is disabled
        # because the runner is short-lived; nothing to clean up.
        run: go test -race -count=1 -tags=integration ./...
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
