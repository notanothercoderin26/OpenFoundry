name: CI — Frontend

on:
  push:
    branches: [main]
    paths: ["apps/web/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]
  pull_request:
    branches: [main]
    paths: ["apps/web/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]

jobs:
  build:
    name: Lint, Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @open-foundry/web lint
      - run: pnpm --filter @open-foundry/web check
      - run: pnpm --filter @open-foundry/web build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @open-foundry/web test:unit

  test-e2e:
    name: E2E (${{ matrix.browser }}, shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm --filter @open-foundry/web exec playwright install --with-deps ${{ matrix.browser }}
      - name: Run E2E tests
        env:
          E2E_BROWSERS: ${{ matrix.browser }}
        run: |
          pnpm --filter @open-foundry/web exec playwright test \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }}/4
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: apps/web/playwright-report
          retention-days: 14
      - name: Upload traces, screenshots & videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: apps/web/test-results
          retention-days: 14
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit-${{ matrix.browser }}-shard${{ matrix.shard }}
          path: apps/web/test-results/junit.xml
          retention-days: 14
