name: Docker — Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # All publishable Go services under services/* (one matrix entry
        # per services/<svc>/cmd/<svc>/main.go). Sorted alphabetically;
        # keep in sync with `ls services/` minus the exclusions below.
        #
        # Excluded — DO NOT add to the matrix:
        #   * pipeline-runner-spark — Scala/sbt build that emits a JAR
        #     via a `FROM scratch AS exporter` stage. It is consumed by
        #     services/pipeline-runner at build time, not published as a
        #     runtime image. Re-evaluate in Wave 2.5 when the PySpark
        #     base-image story lands.
        service:
          - action-log-sink
          - agent-runtime-service
          - ai-evaluation-service
          - ai-sink
          - application-composition-service
          - audit-compliance-service
          - audit-sink
          - authorization-policy-service
          - cipher-service
          - code-repository-review-service
          - compute-module-service
          - connector-management-service
          - dataset-versioning-service
          - edge-gateway-service
          - entity-resolution-service
          - federation-product-exchange-service
          - function-runtime-service
          - global-branch-service
          - iceberg-catalog-service
          - iceberg-object-indexer
          - identity-federation-service
          - ingestion-replication-service
          - knowledge-index-service
          - lineage-service
          - llm-catalog-service
          - media-sets-service
          - media-transform-runtime-service
          - model-catalog-service
          - model-deployment-service
          - network-boundary-service
          - notebook-runtime-service
          - notification-alerting-service
          - object-database-service
          - ontology-actions-service
          - ontology-definition-service
          - ontology-exploratory-analysis-service
          - ontology-indexer
          - ontology-query-service
          - pipeline-build-service
          - pipeline-runner
          - reindex-coordinator-service
          - report-service
          - retrieval-context-service
          - sdk-generation-service
          - solution-design-service
          - sql-bi-gateway-service
          - telemetry-governance-service
          - tenancy-organizations-service
          - workflow-automation-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Tag policy: branch ref (e.g. `main`), semver on tag push (e.g.
      # `1.2.3`), and the commit SHA. We intentionally do NOT emit a
      # `latest` tag — production deploys pin to an immutable SHA.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - name: Assert service Dockerfile exists
        run: test -f "services/${{ matrix.service }}/Dockerfile"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
