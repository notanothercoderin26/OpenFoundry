name: Proto — Lint, OpenAPI & SDK

on:
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "tools/of-cli/**"
      - "apps/web/public/generated/openapi/**"
      - "sdks/typescript/openfoundry-sdk/**"
      - "sdks/python/openfoundry-sdk/**"
      - "sdks/java/openfoundry-sdk/**"
      - "apps/web/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/proto-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "proto/**"
      - "tools/of-cli/**"
      - "apps/web/public/generated/openapi/**"
      - "sdks/typescript/openfoundry-sdk/**"
      - "sdks/python/openfoundry-sdk/**"
      - "sdks/java/openfoundry-sdk/**"
      - "apps/web/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/proto-check.yml"

jobs:
  lint:
    name: Buf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          input: proto

  openapi:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate committed OpenAPI matches proto contracts
        run: make openapi-check

  sdk-typescript:
    name: TypeScript SDK Drift Check & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: make sdk-typescript-check
      - run: pnpm --dir apps/web exec tsc -p ../../sdks/typescript/openfoundry-sdk/tsconfig.json --noEmit

  sdk-python:
    name: Python SDK Drift Check & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: make sdk-python-check
      - run: python -m compileall sdks/python/openfoundry-sdk

  sdk-java:
    name: Java SDK Drift Check & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: make sdk-java-check
      - run: find sdks/java/openfoundry-sdk/src/main/java -name '*.java' -print0 | xargs -0 javac --release 17 -d /tmp/java-out
