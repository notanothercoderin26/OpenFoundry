# Canonical declarative spec for the Geopolitical Intelligence PoC
# Global Branch demo state. SOURCE OF TRUTH for the run script and
# the demo crescendo at 11-guion-demo.md §"42–47 — Branch demo".
#
# Foundry-native framing
# -----------------------
# Per Palantir's Global Branching docs, a branch spans datasets,
# transforms, ontology, Workshop, and Actions. The OpenFoundry
# implementation is global-branch-service + dataset-versioning +
# ontology-actions + application-composition. Each service registers
# itself as a "participant" on the branch via the participants API.
# References:
#
#   - https://www.palantir.com/docs/foundry/foundry-branching/overview/
#   - https://www.palantir.com/docs/foundry/foundry-branching/supported-functionality/
#   - https://www.palantir.com/docs/foundry/workshop/branching-rebasing/
#
# Engine-mapping caveats (per the docs above)
# --------------------------------------------
# - Workshop modules: branch-aware for the editable widgets only.
#   The vertex_graph_embed and agent widgets in Item 7 are NOT
#   branch-editable per the Workshop branching page; the branch
#   demo MUST exercise the surrounding widgets (filter_list,
#   object_table, map, timeline, button_group).
# - Quiver dashboards: not branch-modifiable (also per the page).
#   The branch demo intentionally does not touch Quiver.
# - Diff surface: OpenFoundry's global-branch-service does NOT today
#   expose a `/diff` endpoint. The "show the diff" beat in the demo
#   script is performed by the operator showing the participating
#   datasets' transaction history side-by-side. Surfaced honestly
#   under engine_mapping_notes below.
#
# Legal pitfall
# --------------
# The 12 candidate actors below are FICTITIOUS organisations chosen
# so they cannot be mistaken for real OFAC / EU / OpenSanctions
# rows. Names use generic geographic + industry words assembled in
# combinations that produce no SDN-style hits. The Wikidata Q-IDs
# use the reserved `Q9999000xxx` range that does not resolve at
# wikidata.org. NEVER replace these with real persons or real
# entities; doing so creates legal exposure (defamation,
# reputational damage) and breaches the PoC contract's "public,
# legal" data rule.

branch_demo:
  schema_version: geopolitica.branch-demo.v1

  branch:
    name: sanctions-extension-2026Q3
    base_ref: main
    description: |
      Demo branch for the PoC's branch crescendo (UC-6). Adds 12
      fictitious candidate organisations as PROPOSED SanctionsEntry
      rows so the Workshop module + AIP copilot can preview the
      downstream effect (Actor.is_sanctioned flips, Graph re-renders,
      Map redraws) before the senior reviewer merges or discards.

  # ──────────────────────────────────────────────────────────────────
  # Services that must register as participants once the branch is
  # created. Order matters for the demo: datasets first (so the
  # branch-aware writes have somewhere to land), then ontology so
  # the new SanctionsEntry rows are queryable, then Workshop so the
  # module re-renders with branch data.
  # ──────────────────────────────────────────────────────────────────
  participants:
    - service_name: dataset-versioning-service
      local_branch_ref: branches/sanctions-extension-2026Q3
    - service_name: pipeline-build-service
      local_branch_ref: branches/sanctions-extension-2026Q3
    - service_name: ontology-definition-service
      local_branch_ref: branches/sanctions-extension-2026Q3
    - service_name: object-database-service
      local_branch_ref: branches/sanctions-extension-2026Q3
    - service_name: ontology-actions-service
      local_branch_ref: branches/sanctions-extension-2026Q3
    - service_name: application-composition-service
      local_branch_ref: branches/sanctions-extension-2026Q3

  # ──────────────────────────────────────────────────────────────────
  # 12 fictitious candidates. Each entry maps to one submission of
  # the propose-sanctions-extension Action Type (seeded by Item 3 /
  # Gap 2) targeting the SanctionsEntry object type. The action's
  # parameters drive the SanctionsEntry row that is created on the
  # branch and the link back to the candidate Actor.
  #
  # IDs use synthetic stable prefixes:
  #   actor_id format:   actor:demo:fict-org:NNN
  #   wikidata_qid:      Q999900NNNN  (reserved demo range, non-resolving)
  #
  # The 12 are chosen across the PoC's focus countries (UA, RU, SD,
  # SY, IL, PS, YE, MX, CO, VE plus two extras) to exercise the
  # map's clustering + the graph's neighborhood pivot.
  # ──────────────────────────────────────────────────────────────────
  candidates:

