  # ──────────────────────────────────────────────────────────────────
  # Action template used for each submission. The run script
  # iterates over `candidates[]` and POSTs one body per candidate to
  # ontology-actions-service. The Branch context is carried via the
  # branch's name as an HTTP header (operator wiring; documented in
  # the runbook).
  # ──────────────────────────────────────────────────────────────────
  action_template:
    action_type: propose-sanctions-extension
    confirmation_required: true
    body_per_candidate:
      parameters:
        actor_id:        "{{ candidate.actor_id }}"
        display_name:    "{{ candidate.display_name }}"
        country_iso3:    "{{ candidate.country_iso3 }}"
        wikidata_qid:    "{{ candidate.wikidata_qid }}"
        program:         "PROPOSED-2026Q3"
        proposed_status: "PROPOSED"
        rationale:       "{{ candidate.rationale }}"
      justification: "Demo branch UC-6 — fictitious candidate batch for PoC narrative; senior review required before merge."

  # ──────────────────────────────────────────────────────────────────
  # Preview hooks — what the demo script clicks through after the
  # 12 actions have been submitted on the branch. Each hook points
  # at a request the operator runs to make the branch effect visible.
  # ──────────────────────────────────────────────────────────────────
  preview_hooks:
    - id: rerun-sanctions-aggregator
      description: Re-run the sanctions-aggregator transform on the branch so the 12 candidates fan out into the canonical Actor table.
      endpoint: "POST /api/v1/pipelines/{sanctions-aggregator}/run"
      headers:
        X-Of-Branch: "{{ branch.name }}"

    - id: workshop-branch-toggle
      description: Switch the Workshop runtime to the branch context — the 12 actors render in the map / table / graph.
      endpoint: "GET /apps/public/geopolitical-intel-workbench"
      headers:
        X-Of-Branch: "{{ branch.name }}"

    - id: aip-branch-prompt
      description: Ask the AIP copilot about the 12 candidates while on branch — the response cites the branched ontology rows.
      endpoint: "POST /api/v1/agents/{geopolitica-analyst-copilot}/runs"
      headers:
        X-Of-Branch: "{{ branch.name }}"
      payload:
        input: "Summarise the proposed sanctions candidates added on this branch — group by country."

  # ──────────────────────────────────────────────────────────────────
  # Engine-mapping notes — surfaced honestly per the 00-contract.
  # ──────────────────────────────────────────────────────────────────
  engine_mapping_notes:

    diff_surface_absent:
      summary: |
        global-branch-service does not expose `/diff` today. The
        demo presents the "diff" by showing the participating
        datasets' transaction history side-by-side via
        GET /api/v1/datasets/{rid}/transactions with the
        X-Of-Branch header set vs unset. Surface in the demo
        script as "branch view of transactions" rather than
        "branch diff" to stay honest.

    workshop_embed_widgets_not_branchable:
      summary: |
        vertex_graph_embed and agent widgets are not branch-editable
        per workshop/branching-rebasing. The branch demo MUST
        exercise the surrounding widgets — the embedded ones still
        render data from the branched ontology read-side, just not
        as branch-editable widgets.

    quiver_not_branchable:
      summary: |
        Quiver dashboards do not modify on a branch. The branch
        demo intentionally does not switch Quiver to branch
        context — only Workshop does.

  # ──────────────────────────────────────────────────────────────────
  # Discard plan — the demo script ENDS with discard, not merge.
  # The acceptance criterion talks about "merge produces an
  # ActionLog with the 12 candidates"; the merge dry-run delivers
  # the same audit content without touching main.
  # ──────────────────────────────────────────────────────────────────
  finalisation:
    mode: discard
    dry_run_merge_first: true
    notes: |
      The demo script (11-guion-demo.md:96) discards the branch
      to return to main. A dry-run merge call first produces the
      ActionLog rows that the acceptance criterion demands; the
      subsequent discard reverts the branch state. If a customer
      asks to see merge, the same workflow runs with
      finalisation.mode = merge.

  # ──────────────────────────────────────────────────────────────────
  # Acceptance — operator ticks each box during rehearsal.
  # ──────────────────────────────────────────────────────────────────
  acceptance:
    - id: branch-created
      check: "POST /api/v1/global-branches succeeds; GET /api/v1/global-branches lists the row with base_ref=main."
    - id: participants-registered
      check: "GET /api/v1/global-branches/{id}/participants returns the 6 services above."
    - id: candidates-submitted
      check: "12 ActionLog rows exist for action_type=propose-sanctions-extension on the branch, queryable via audit-compliance-service."
    - id: pipeline-rerun-on-branch
      check: "sanctions-aggregator transform produces a new dataset transaction on the branch; row count = main + 12."
    - id: workshop-branch-banner
      check: "GET /apps/public/geopolitical-intel-workbench with X-Of-Branch header renders a 'Branch: sanctions-extension-2026Q3' indicator and the 12 actors appear in the map."
    - id: aip-branch-context
      check: "AIP copilot run with X-Of-Branch header returns content citing actor:demo:fict-org:001..012 by display_name; no hallucinated identifiers."
    - id: finalisation-clean
      check: "Discard removes the branch state; main is bit-identical to the snapshot taken before the demo (verify by sha256 of the sanctions-aggregator transaction id list)."
