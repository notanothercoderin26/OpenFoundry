global:
  existingSecret: open-foundry-prod-env
  deploymentFabric:
    environment: production

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
  hosts:
    - host: openfoundry.example.com
      paths:
        - path: /
  tls:
    - secretName: open-foundry-prod-tls
      hosts:
        - openfoundry.example.com

objectStore:
  backend: ceph
  endpoint: http://rook-ceph-rgw-openfoundry.rook-ceph.svc:80
  region: us-east-1
  forcePathStyle: true
  accessKeySecretKey: OBJECT_STORE_ACCESS_KEY
  secretKeySecretKey: OBJECT_STORE_SECRET_KEY
  buckets:
    datasets: openfoundry-datasets
    models: openfoundry-models
    iceberg: openfoundry-iceberg

icebergRestCatalog:
  url: http://lakekeeper.lakekeeper.svc:8181

trino:
  enabled: true
  coordinator:
    replicas: 2
  worker:
    autoscaling:
      enabled: true
      minReplicas: 4
      maxReplicas: 16

# spark-operator: removed by ADR-0045 Phase D. Pipeline runs now go
# through the pipeline-runner Job dispatched by
# pipeline-build-service's internal/dispatch package.

mimir:
  enabled: true
  monolithic:
    replicas: 3
