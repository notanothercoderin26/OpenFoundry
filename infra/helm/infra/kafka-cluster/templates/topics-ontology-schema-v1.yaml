---
# Action type schema mutations (Create/Update/Delete of action TYPES —
# distinct from `ontology.action.applied.v1` which carries action
# EXECUTIONS). Produced by `ontology-actions-service` once the kernel
# hook lands (see PoC/blockers/B02-ontology-definition.md, §"Deferred").
# The topic is provisioned ahead of the producer code so the Strimzi
# rollout doesn't block on it.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: ontology.action_type.changed.v1
  namespace: kafka
  labels:
    strimzi.io/cluster: openfoundry
    openfoundry.io/topic-class: domain
    openfoundry.io/domain: ontology
    openfoundry.io/version: v1
spec:
  partitions: 6
  replicas: 3
  config:
    min.insync.replicas: "2"
    cleanup.policy: delete
    retention.ms: "2592000000"
    compression.type: producer
    segment.ms: "21600000"
---
# DLQ for the outbox-pg-schemas connector. Mirrors the existing
# __dlq.outbox-pg-policy.v1 used by the pg-policy connector.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: __dlq.outbox-pg-schemas.v1
  namespace: kafka
  labels:
    strimzi.io/cluster: openfoundry
    openfoundry.io/topic-class: dlq
spec:
  partitions: 6
  replicas: 3
  config:
    min.insync.replicas: "2"
    cleanup.policy: delete
    retention.ms: "1209600000"
    compression.type: producer
{{- end }}
