{{- if .Values.pgRuntimeConfig.enabled }}
---
# S6.1.c + S6.1.d — bootstrap SQL for `pg-runtime-config`.
# See `pg-schemas-bootstrap-sql.yaml` for the design rationale shared
# by all four consolidated clusters.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-runtime-config-bootstrap-sql
  namespace: openfoundry
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/instance: pg-runtime-config
    openfoundry.io/managed-by: cnpg
data:
  bootstrap.sql: |
    -- ============================================================
    -- pg-runtime-config — runtime/control-plane bounded contexts
    -- ============================================================
    -- pgcrypto is required by several service migrations (gen_random_uuid()).
    -- Extensions need superuser; created here at bootstrap time.
    CREATE EXTENSION IF NOT EXISTS pgcrypto;

    -- Shared role: granted ownership of the cluster-wide outbox table so
    -- every svc_<bc> that is a member can execute DDL (CREATE INDEX
    -- IF NOT EXISTS, ALTER TABLE REPLICA IDENTITY FULL, ...) on it
    -- without each service needing to be the literal owner.
    CREATE ROLE outbox_writers NOLOGIN;

    DO $$
    DECLARE
      bc TEXT;
      bcs TEXT[] := ARRAY[
        'agent_runtime',
        'function_runtime',
        'notebook_runtime',
        'managed_workspace',
        'custom_endpoints',
        'developer_console',
        'app_builder',
        'application_composition',
        'spreadsheet_computation',
        'notification_alerting',
        'monitoring_rules',
        'health_check',
        'execution_observability',
        'workflow_automation',
        'automation_operations',
        'workflow_trace',
        'pipeline_authoring',
        'pipeline_build',
        'compute_modules_control_plane',
        'compute_modules_runtime',
        'sql_bi_gateway',
        'sql_warehousing',
        'tabular_analysis',
        -- S8 / ADR-0030 — `analytical_logic` schema for the
        -- `analytical_expressions` / `analytical_expression_versions`
        -- tables absorbed into `sql-bi-gateway-service` from the
        -- retired `analytical-logic-service`. Reusable expressions are
        -- now an internal library (`libs/analytical-logic`) consumed
        -- in-process by the gateway.
        'analytical_logic',
        'time_series_data',
        'report',
        -- FASE 4 / Tarea 4.2 — bounded context for
        -- `services/reindex-coordinator-service`. Owns the
        -- `reindex_coordinator.reindex_jobs` resume-cursor table that
        -- replaces the Temporal workflow `ResumeToken` from the legacy
        -- Go `workers-go/reindex` worker (ADR-0021).
        'reindex_coordinator',
        'ai_evaluation',
        'compute_module',
        'model_deployment',
        'ontology_actions',
        'retrieval_context'
      ];
    BEGIN
      FOREACH bc IN ARRAY bcs LOOP
        EXECUTE format(
          'CREATE ROLE svc_%I LOGIN PASSWORD %L NOINHERIT',
          bc,
          'PLACEHOLDER_ROTATE_VIA_EXTERNAL_SECRETS'
        );
        EXECUTE format('CREATE SCHEMA IF NOT EXISTS %I AUTHORIZATION svc_%I', bc, bc);
        EXECUTE format('REVOKE ALL ON SCHEMA %I FROM PUBLIC', bc);
        EXECUTE format('GRANT USAGE ON SCHEMA %I TO svc_%I', bc, bc);
        -- Required so service migrations can run `CREATE SCHEMA IF NOT EXISTS`
        -- (Postgres evaluates the privilege check BEFORE the IF NOT EXISTS).
        EXECUTE format('GRANT CREATE ON DATABASE app TO svc_%I', bc);
        EXECUTE format(
          'ALTER DEFAULT PRIVILEGES FOR ROLE svc_%I IN SCHEMA %I '
          'GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO svc_%I',
          bc, bc, bc
        );
        EXECUTE format(
          'ALTER DEFAULT PRIVILEGES FOR ROLE svc_%I IN SCHEMA %I '
          'GRANT USAGE, SELECT ON SEQUENCES TO svc_%I',
          bc, bc, bc
        );
      END LOOP;
    END$$;

    -- Shared transactional outbox for the runtime-config cluster (ADR-0022).
    -- Several pg-runtime-config services ship per-service migrations that
    -- create `outbox.events` themselves. Pre-creating the schema as
    -- superuser + granting access avoids the "first service to migrate
    -- owns the schema" ownership conflict.
    CREATE SCHEMA IF NOT EXISTS outbox;
    REVOKE ALL ON SCHEMA outbox FROM PUBLIC;

    CREATE TABLE IF NOT EXISTS outbox.events (
      event_id     UUID PRIMARY KEY,
      aggregate    TEXT NOT NULL,
      aggregate_id TEXT NOT NULL,
      payload      JSONB NOT NULL,
      headers      JSONB NOT NULL DEFAULT '{}'::jsonb,
      topic        TEXT NOT NULL DEFAULT '',
      created_at   TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS outbox_events_created_at_idx
      ON outbox.events (created_at);
    ALTER TABLE outbox.events REPLICA IDENTITY FULL;
    -- Transfer ownership to outbox_writers so member roles can issue
    -- DDL (CREATE INDEX IF NOT EXISTS, ALTER TABLE REPLICA IDENTITY ...)
    -- without being the literal owner of the table.
    ALTER TABLE outbox.events OWNER TO outbox_writers;

    -- Cross-schema accesses needed by services in pg-runtime-config:
    --   * workflow-automation-service writes to `automation_operations.processed_events`
    --     (idempotency table); needs CREATE on the schema owned by svc_automation_operations.
    DO $$
    DECLARE
      bc TEXT;
      bcs TEXT[] := ARRAY[
        'agent_runtime','function_runtime','notebook_runtime','managed_workspace',
        'custom_endpoints','developer_console','app_builder','application_composition',
        'spreadsheet_computation','notification_alerting','monitoring_rules',
        'health_check','execution_observability','workflow_automation',
        'automation_operations','workflow_trace','pipeline_authoring','pipeline_build',
        'compute_modules_control_plane','compute_modules_runtime','sql_bi_gateway',
        'sql_warehousing','tabular_analysis','analytical_logic','time_series_data',
        'report','reindex_coordinator','ai_evaluation','compute_module',
        'model_deployment','ontology_actions','retrieval_context'
      ];
    BEGIN
      FOREACH bc IN ARRAY bcs LOOP
        EXECUTE format('GRANT USAGE, CREATE ON SCHEMA outbox TO svc_%I', bc);
        EXECUTE format('GRANT INSERT, DELETE, SELECT ON outbox.events TO svc_%I', bc);
        -- Membership in outbox_writers grants the role's privileges,
        -- including ownership-level operations on outbox.events.
        EXECUTE format('GRANT outbox_writers TO svc_%I WITH INHERIT TRUE', bc);
      END LOOP;
    END$$;

    GRANT USAGE, CREATE ON SCHEMA automation_operations TO svc_workflow_automation;
{{- end }}
