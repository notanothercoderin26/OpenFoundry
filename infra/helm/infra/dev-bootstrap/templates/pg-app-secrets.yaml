{{- if .Values.enabled }}
{{- /*
CNPG requires `bootstrap.initdb.secret` to exist before the Cluster CR
boots. The postgres-clusters chart references `<cluster>-app` but does
not emit it; prod gets it from External Secrets Operator. In dev we
create one `kubernetes.io/basic-auth` Secret per cluster with the same
placeholder password the bootstrap-SQL hands out to every `svc_<bc>`
role.
*/}}
{{- $pass := .Values.postgresPlaceholderPassword -}}
{{- $ns := .Values.namespaces.openfoundry -}}
{{- range $name, $spec := .Values.postgresAppSecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: cnpg-bootstrap
type: kubernetes.io/basic-auth
stringData:
  username: {{ $spec.username | quote }}
  password: {{ $pass | quote }}
{{- end }}
{{- end }}
