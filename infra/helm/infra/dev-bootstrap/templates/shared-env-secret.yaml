{{- if .Values.enabled }}
{{- /*
Every of-* chart mounts a global env secret via `envFrom` (the name is
controlled by `global.existingSecret`, which the dev profile sets to
`open-foundry-dev-env`). Some service-level `envSecrets` entries
hardcode the prod name `open-foundry-env`, so we emit both with
identical content.

Cassandra superuser credentials are read at template time from the
operator-managed secret in the k8ssandra-operator namespace so
services do not need a separate `valueFrom.secretKeyRef`.
*/}}
{{- $cassSecret := lookup "v1" "Secret" .Values.cassandraSuperuserSecret.namespace .Values.cassandraSuperuserSecret.name -}}
{{- $cassUser := "" -}}
{{- $cassPass := "" -}}
{{- if $cassSecret -}}
  {{- $cassUser = index $cassSecret.data "username" | b64dec -}}
  {{- $cassPass = index $cassSecret.data "password" | b64dec -}}
{{- end -}}
{{- $shared := merge (dict) .Values.sharedEnv -}}
{{- $_ := set $shared "CASSANDRA_USERNAME" $cassUser -}}
{{- $_ := set $shared "CASSANDRA_PASSWORD" $cassPass -}}
{{- $_ := set $shared "CREDENTIAL_ENCRYPTION_KEY" .Values.encryption.base64Key -}}
{{- $_ := set $shared "ENCRYPTION_KEY" .Values.encryption.base64Key -}}
{{- $_ := set $shared "OF_CIPHER_LOCAL_KEK" .Values.encryption.hexKey -}}
{{- $_ := set $shared "JWT_SECRET" .Values.jwt.secret -}}
{{- range $name := list "open-foundry-env" "open-foundry-dev-env" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespaces.openfoundry }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: shared-env
type: Opaque
stringData:
{{- range $key, $value := $shared }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: openfoundry-jwt
  namespace: {{ .Values.namespaces.openfoundry }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: jwt
type: Opaque
stringData:
  jwt_secret: {{ .Values.jwt.secret | quote }}
{{- end }}
