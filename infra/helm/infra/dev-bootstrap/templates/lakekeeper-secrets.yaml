{{- if .Values.enabled }}
{{- /*
Lakekeeper consumes pg-lakekeeper-app from its own namespace and an
encryption key for per-warehouse credential sealing. In prod both
come from External Secrets; in dev we mirror the placeholder password
into lakekeeper/pg-lakekeeper-app and generate a stable 32-byte hex
key for `LAKEKEEPER__PG_ENCRYPTION_KEY`.
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-lakekeeper-app
  namespace: {{ .Values.namespaces.lakekeeper }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cnpg-bootstrap
type: kubernetes.io/basic-auth
stringData:
  username: {{ (index .Values.postgresAppSecrets "pg-lakekeeper-app" "username") | quote }}
  password: {{ .Values.postgresPlaceholderPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-encryption-key
  namespace: {{ .Values.namespaces.lakekeeper }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: lakekeeper
type: Opaque
stringData:
  encryptionKey: {{ .Values.encryption.hexKey | quote }}
{{- end }}
