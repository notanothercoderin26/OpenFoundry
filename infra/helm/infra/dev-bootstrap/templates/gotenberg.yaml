{{- if and .Values.enabled .Values.gotenberg.enabled }}
{{- /*
Slice E (notepad rich-text export): Gotenberg sidecar that backs the
HTML→PDF export route of notebook-runtime-service. DOCX export uses a
pure-Go writer in-process and does not depend on this Deployment.

Reachable in-cluster at:
  http://of-notepad-gotenberg.{{ .Values.namespaces.openfoundry }}.svc.cluster.local:3000

`values-dev.yaml` of `of-apps-ops` injects `GOTENBERG_URL` pointing
here so the notebook-runtime-service handler enables the PDF route.
*/}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: of-notepad-gotenberg
  namespace: {{ .Values.namespaces.openfoundry }}
  labels:
    app: of-notepad-gotenberg
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: notepad-pdf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: of-notepad-gotenberg
  template:
    metadata:
      labels:
        app: of-notepad-gotenberg
    spec:
      containers:
        - name: gotenberg
          image: {{ .Values.gotenberg.image | quote }}
          args:
            - gotenberg
            - --api-port=3000
            - --api-timeout=60s
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.gotenberg.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: of-notepad-gotenberg
  namespace: {{ .Values.namespaces.openfoundry }}
  labels:
    app: of-notepad-gotenberg
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: notepad-pdf
spec:
  selector:
    app: of-notepad-gotenberg
  ports:
    - name: http
      port: 3000
      targetPort: 3000
{{- end }}
